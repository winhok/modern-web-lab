<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>css_display</title>
    <style>
      .bar ul {
        margin: 0;
        padding: 0;
      }

      .bar {
        width: 200px;
        height: 150px;
        background-color: #eee;
      }

      .bar li {
        /* block 元素独占一行，可以设置宽高，默认宽度撑满父容器。 */
        display: block;
      }

      .bar li:hover {
        background-color: #ff8a00;
      }

      .box ul {
        margin: 0;
        padding: 0;
      }

      .box {
        background-color: #ff8a00;
        width: 440px;
        /* 去掉 inline-block 元素之间由换行/空格产生的空白缝隙。 */
        font-size: 0;
      }

      .box li {
        /* inline-block 不独占一行，同时可以设置宽高。 */
        display: inline-block;
        width: 110px;
        height: 300px;
        /* 父元素 font-size 为 0 后，需要给子元素恢复文字大小。 */
        font-size: 16px;
      }

      .box li:hover {
        background-color: rgba(255, 255, 255, 0.4);
      }

      .list {
        width: 300px;
        background-color: #eee;
      }

      .list a {
        /* a 默认是 inline，改成 inline-block 后才能稳定设置 padding 和间距。 */
        display: inline-block;
        background-color: #ff8a00;
        color: #000;
        padding: 0% 10px;
        margin: auto 5px;
      }
    </style>
  </head>

  <div class="bar">
    <ul>
      <li>手机</li>
      <li>平板</li>
      <li>电脑</li>
      <li>智能穿搭</li>
      <li>智能电视</li>
      <li>智能音箱</li>
    </ul>
  </div>

  <br />

  <div class="box">
    <ul>
      <li>系统</li>
      <li>性能</li>
      <li>拍照</li>
      <li>续航</li>
    </ul>
  </div>

  <br />

  <div class="list">
    <a href="#">系统</a>
    <a href="#">性能</a>
    <a href="#">拍照</a>
    <a href="#">续航</a>
    <a href="#">ai赋能</a>
    <a href="#">安全管理</a>
    <a href="#">隐私保护</a>
    <a href="#">软件更新</a>
    <a href="#">充电器</a>
  </div>
</html>
